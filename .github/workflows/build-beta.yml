name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Diagnose Environment
        run: |
          echo "=== Node ==="
          node --version
          echo "=== Java ==="
          java -version 2>&1
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== SDK dirs ==="
          for dir in /usr/local/lib/android/sdk /usr/local/share/android-sdk ~/Android/Sdk; do
            if [ -d "$dir" ]; then
              echo "Found: $dir"
              ls -la "$dir/" 2>/dev/null
              echo "--- platforms ---"
              ls -la "$dir/platforms/" 2>/dev/null || echo "  (none)"
              echo "--- build-tools ---"
              ls -la "$dir/build-tools/" 2>/dev/null || echo "  (none)"
              echo "--- cmdline-tools ---"
              ls -la "$dir/cmdline-tools/" 2>/dev/null || echo "  (none)"
            else
              echo "Not found: $dir"
            fi
          done

      - name: Build Release APK
        run: |
          cd android
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --info 2>&1 | tee ../gradle-build.log

      - name: Upload Gradle Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          retention-days: 7

      - name: List Generated APKs
        continue-on-error: true
        run: |
          echo "=== Build output directory ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "Directory not found"
          echo "=== APK files ==="
          find android/app/build/outputs -name "*.apk" -exec ls -lh {} \; || echo "No APK files found"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MusicFree-Local-APK
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
